<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dice Betting Game</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Dice Betting Game</h1>

    <div class="balance">
        <p id="bal">Balance: $100</p>
    </div>
    <label for="betAmount" id="betLabel">Enter Bet Amount:</label>
    <input type="number" id="betAmount" min="1" placeholder="Enter bet ($)">
    <br>
    
    <label for="guess">Place Your Guess:</label>
    <select id="guess">
        <option value="1">1</option>
        <option value="2">2</option>
        <option value="3">3</option>
        <option value="4">4</option>
        <option value="5">5</option>
        <option value="6">6</option>
    </select>
    <button id="rollBtn">Roll Dice</button>
    <p id="result"></p>
    <p id="res"></p>
    <img id="diceImg" src="images/dice1.png" alt="Dice" width="250">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
